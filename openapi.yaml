openapi: 3.1.0
info:
  title: Smart Campus — B4 AI Vision Provider API
  version: 1.0.0
  description: API cung cấp dịch vụ nhận diện hình ảnh và phân tích luồng camera thông minh thuộc nhóm B4.
  contact:
    name: "Nhóm B4 AI Vision"
    email: "b4-aivision@example.edu.vn"
servers:
  - url: http://localhost:4010
    description: Prism mock server
tags:
  - name: health
    description: Kiểm tra trạng thái hoạt động của hệ thống
  - name: vision
    description: Các dịch vụ nhận diện và xử lý hình ảnh AI
paths:
  /health:
    get:
      operationId: getHealth
      summary: Kiểm tra trạng thái hệ thống
      description: Endpoint dùng để kiểm tra xem hệ thống dịch vụ AI Vision của nhóm B4 còn hoạt động hay không.
      tags:
        - health
      responses:
        '200':
          description: Hệ thống hoạt động bình thường
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "OK"
  /vision/models:
    get:
      operationId: listModels
      summary: Lấy danh sách các AI model khả dụng
      description: Cung cấp danh sách các mô hình nhận diện (như khuôn mặt, biển số xe) đang được nạp trong hệ thống.
      tags:
        - vision
      responses:
        '200':
          description: Thành công
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string
                  example: "yolov8-face-detection"
  /vision/analyze:
    post:
      operationId: analyzeFrame
      summary: Gửi frame hình ảnh để phân tích AI
      description: Tiếp nhận dữ liệu hình ảnh dạng chuỗi Base64 từ các luồng Camera truyền về để nhận diện đối tượng.
      tags:
        - vision
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                camera_id:
                  type: string
                image_base64:
                  type: string
      responses:
        '200':
          description: Xử lý thành công
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnalysisResponse'
        '400':
          description: Dữ liệu không hợp lệ
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
  /vision/predictions/{jobId}:
    get:
      operationId: getPrediction
      summary: Lấy kết quả phân tích theo Job ID
      description: Cho phép truy vấn lại kết quả phân tích hoặc trạng thái nhận diện của một hình ảnh thông qua mã công việc (jobId).
      tags:
        - vision
      parameters:
        - name: jobId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Thành công
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnalysisResponse'
        '404':
          description: Không tìm thấy Job ID
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
components:
  schemas:
    AnalysisResponse:
      type: object
      properties:
        job_id:
          type: string
        status:
          type: string
        prediction:
          $ref: '#/components/schemas/PredictionResult'
    PredictionResult:
      type: object
      required:
        - result_type
      properties:
        result_type:
          type: string
          enum: [face, plate]
        confidence:
          type: number
        additional_info:
          type: [string, "null"]
      discriminator:
        propertyName: result_type
        mapping:
          face: '#/components/schemas/FaceResult'
          plate: '#/components/schemas/PlateResult'
      oneOf:
        - $ref: '#/components/schemas/FaceResult'
        - $ref: '#/components/schemas/PlateResult'
    FaceResult:
      type: object
      properties:
        result_type:
          type: string
          enum: [face]
        confidence:
          type: number
        additional_info:
          type: [string, "null"]
        face_count:
          type: integer
          example: 2
    PlateResult:
      type: object
      properties:
        result_type:
          type: string
          enum: [plate]
        confidence:
          type: number
        additional_info:
          type: [string, "null"]
        plate_number:
          type: string
          example: "30A-12345"
    ProblemDetails:
      type: object
      properties:
        type:
          type: string
          example: "about:blank"
        title:
          type: string
          example: "Bad Request"
        status:
          type: integer
          example: 400
        detail:
          type: string
          example: "Dữ liệu hình ảnh không đúng định dạng Base64."
        instance:
          type: string
          example: "/vision/analyze"